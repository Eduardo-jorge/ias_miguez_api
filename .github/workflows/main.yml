name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ejecutar pruebas unitarias
        env:
          PYTHONPATH: .
        run: |
          pytest tests/unit/

  deploy-dev:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' # Solo corre en la rama develop
    steps:
      - name: Disparar deploy en Render (Entorno Dev)
        run: |
          curl "${{ secrets.RENDER_DEPLOY_HOOK_DEV }}"

  deploy-qa:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/qa' # Solo corre en la rama qa
    steps:
      - name: Disparar deploy en Render (Entorno QA)
        run: |
          curl "${{ secrets.RENDER_DEPLOY_HOOK_QA }}"

  deploy-prod:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Solo corre en la rama main
    steps:
      - name: Disparar deploy en Render (Entorno Prod)
        run: |
          curl "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"
