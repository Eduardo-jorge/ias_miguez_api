name: CI/CD Pipeline

on:
  push:
    branches:
      - main      # Dispara QA y luego pide permiso para PRD
      - develop   # Dispara DEV automáticamente

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Analizar seguridad con Bandit
        run: |
          bandit -r ./ -ll -ii

      - name: Ejecutar pruebas unitarias
        env:
          PYTHONPATH: .
        run: |
          pytest tests/unit/

  deploy-dev:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' # Solo corre en la rama develop
    steps:
      - name: Disparar deploy en Render (Entorno Dev)
        run: |
          curl "${{ secrets.RENDER_DEPLOY_HOOK_DEV }}"

  deploy-qa:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Según el TP, QA sale de main
    steps:
      - name: Disparar deploy en Render (Entorno QA)
        run: |
          curl "${{ secrets.RENDER_DEPLOY_HOOK_QA }}"

  deploy-prod:
    needs: [test, deploy-qa] # Espera a que QA esté listo antes de pedir aprobación
    runs-on: ubuntu-latest
    environment: production # ESTO FRENA EL DEPLOY Y TE PIDE APROBACIÓN
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Disparar deploy en Render (Entorno Prod)
        run: |
          curl "${{ secrets.RENDER_DEPLOY_HOOK_PRD }}"
