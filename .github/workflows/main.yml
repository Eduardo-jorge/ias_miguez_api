name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Se ejecuta cuando haces push a la rama main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Asegurate de que coincida con la versión que usas

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Ejecutar pruebas unitarias
        env:
          PYTHONPATH: .
        run: |
          pytest tests/unit/
      

  deploy-dev:
    needs: test # Solo se ejecuta si el trabajo de "test" da verde
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy en Render (Entorno Dev)
        # Llama a la URL que guardaste recién para avisarle a Render
        run: |
          curl "${{ secrets.RENDER_DEPLOY_HOOK_DEV }}"
